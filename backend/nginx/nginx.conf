events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip settings
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream backend_app {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Client body size limit (e.g. for avatar uploads)
        client_max_body_size 10M;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Healthcheck proxy
        location /health {
            proxy_pass http://backend_app/api/v1/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API routing
        location /api/v1/ {
            proxy_pass http://backend_app/api/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable buffering for event streams/faster responses
            proxy_buffering off;
        }

        # WebSocket routing
        location /ws/ {
            proxy_pass http://backend_app/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSockets keep-alive timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # OpenAPI Documentation routing (FastAPI Swagger/Redoc)
        location /docs {
            proxy_pass http://backend_app/docs;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend_app/redoc;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend_app/openapi.json;
            proxy_set_header Host $host;
        }

        # Static assets/Fallback (if frontend is built and served)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
